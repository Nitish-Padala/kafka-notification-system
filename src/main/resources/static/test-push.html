<!DOCTYPE html>
<html lang="en">
<head>
    <title>FCM Token Generator</title>
</head>
<body>
    <h1 style="font-family: sans-serif;">Firebase Push Token Generator</h1>
    <p style="font-family: sans-serif;">1. Open Console (F12) <br> 2. Click button below</p>
    <button id="getTokenBtn" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Request Token</button>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>

    <script>
        // 1. PASTE YOUR CONFIG HERE
        const firebaseConfig = {
		  	apiKey: "AIzaSyCqVUphW2wMGZqXFFYdgdBDQkGCzEb1nzc",
 			authDomain: "kafka-notification-system.firebaseapp.com",
  			projectId: "kafka-notification-system",
  			storageBucket: "kafka-notification-system.firebasestorage.app",
  			messagingSenderId: "640226249625",
  			appId: "1:640226249625:web:1873200d7625a5c54f2108",
  			measurementId: "G-D1J3XKY14B"
		};
        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        document.getElementById('getTokenBtn').addEventListener('click', async () => {
            try {
                console.log('Step 1: Requesting permission...');
                const permission = await Notification.requestPermission();

                if (permission !== 'granted') {
                    alert('Permission denied. Please enable notifications in browser settings.');
                    return;
                }

                console.log('Step 2: Registering Service Worker...');
                // EXPLICITLY register the worker and wait for it to be active
                const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');

                // Wait for the registration to be fully active
                await navigator.serviceWorker.ready;
                console.log('Service Worker is now ACTIVE!');

                console.log('Step 3: Fetching Token...');
                const currentToken = await messaging.getToken({
                    vapidKey: 'BIKroqb2aFGfsFpd4y6xvFlfk5do3Ob0WuQHq43g4uExxvSHditgFIQzTlFfPcapKzD3D4tUQnnKe1zOd-l8xlY'
                });

                if (currentToken) {
                    console.log('---------------------------------------');
                    console.log('SUCCESS! YOUR DEVICE TOKEN:');
                    console.log(currentToken);
                    console.log('---------------------------------------');
                    alert('Token generated! Check the browser console (F12)');
                }
            } catch (err) {
                console.error('ERROR:', err);
                alert('Error: ' + err.message);
            }
        });
    </script>
</body>
</html>
